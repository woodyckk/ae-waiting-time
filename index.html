<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港急症室輪候時間 (預覽版)</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #e74c3c; 
            --bg: #f8f9fa; 
            --success: #27ae60;
        }
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 15px; 
        }
        .dashboard { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        header { 
            text-align: center; 
            border-bottom: 2px solid #eee; 
            margin-bottom: 20px; 
            padding-bottom: 10px; 
        }
        h1 { color: var(--primary); margin: 0; font-size: 1.5rem; }
        .status-tag {
            display: inline-block;
            background: #e8f4fd;
            color: #2980b9;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        .update-info { text-align: right; font-size: 0.85rem; color: #888; margin: 10px 0; }
        
        /* 表格樣式優化 */
        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #fdfdfd; color: var(--primary); padding: 15px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #eee; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f1f1; font-size: 0.95rem; color: #444; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #fcfcfc; }
        
        /* 狀態顏色 */
        .hosp-name { font-weight: bold; color: var(--primary); }
        .warning { color: var(--accent); font-weight: bold; }
        .rescue { color: #d35400; font-weight: bold; background: #fff5eb; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>🏥 急症室分流輪候時間</h1>
            <div class="status-tag">數據源：醫院管理局 (HA)</div>
        </header>
        
        <p id="updateTime" class="update-info">載入中...</p>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>醫院</th>
                        <th>第一類 (危急)</th>
                        <th>第三類 (次緊急)</th>
                        <th>第四/五類 (非緊急)</th>
                    </tr>
                </thead>
                <tbody id="hospitalData">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 這是你上傳的真實數據快照
        const dataSnapshot = {
            "updateTime": "2026年3月18日 下午4時30分",
            "waitTime": [
                {"hospName":"雅麗氏何妙齡那打素醫院", "t1wt":"0 分鐘", "t3p50":"28 分鐘", "t45p95":"5 小時"},
                {"hospName":"明愛醫院", "t1wt":"0 分鐘", "t3p50":"17 分鐘", "t45p95":"4.5 小時"},
                {"hospName":"廣華醫院", "t1wt":"0 分鐘", "t3p50":"13 分鐘", "t45p95":"5 小時"},
                {"hospName":"北區醫院", "t1wt":"多名病人正在搶救中", "t3p50":"25 分鐘", "t45p95":"7 小時"},
                {"hospName":"東區尤德夫人那打素醫院", "t1wt":"0 分鐘", "t3p50":"17 分鐘", "t45p95":"6.5 小時"},
                {"hospName":"威爾斯親王醫院", "t1wt":"0 分鐘", "t3p50":"23 分鐘", "t45p95":"13.5 小時"},
                {"hospName":"伊利沙伯醫院", "t1wt":"0 分鐘", "t3p50":"9 分鐘", "t45p95":"2.5 小時"},
                {"hospName":"屯門醫院", "t1wt":"0 分鐘", "t3p50":"16 分鐘", "t45p95":"9.5 小時"},
                {"hospName":"仁濟醫院", "t1wt":"0 分鐘", "t3p50":"24 分鐘", "t45p95":"7 小時"}
            ]
        };

        function renderTable(data) {
            const tbody = document.getElementById('hospitalData');
            document.getElementById('updateTime').innerText = `最後更新：${data.updateTime}`;
            
            tbody.innerHTML = ""; 

            data.waitTime.forEach(hosp => {
                const row = document.createElement('tr');
                
                // 邏輯處理：判斷是否為「搶救中」或「等候時間過長」
                const isRescue = hosp.t1wt.includes("搶救");
                const waitTimeNum = parseFloat(hosp.t45p95);
                const isVeryLong = waitTimeNum >= 6; // 超過 6 小時標示為紅色

                row.innerHTML = `
                    <td class="hosp-name">${hosp.hospName}</td>
                    <td class="${isRescue ? 'rescue' : ''}">${hosp.t1wt}</td>
                    <td>${hosp.t3p50}</td>
                    <td class="${isVeryLong ? 'warning' : ''}">${hosp.t45p95}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 初始化頁面
        renderTable(dataSnapshot);
    </script>
</body>
</html>
