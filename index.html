<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港急症室實時輪候時間</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .dashboard { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        .update-info { text-align: right; font-size: 0.9em; color: #666; margin: 10px 0; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95em; }
        tr:hover { background: #f9f9f9; }
        .warning { color: var(--accent); font-weight: bold; }
        .loading { text-align: center; padding: 50px; color: var(--primary); font-size: 1.1em; }
        .error-msg { color: #e74c3c; text-align: center; padding: 20px; border: 1px dashed #e74c3c; margin: 20px 0; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>🏥 急症室分流輪候時間</h1>
        <p id="updateTime" class="update-info">正在連線至醫管局伺服器...</p>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>醫院</th>
                        <th>第一類 (危急)</th>
                        <th>第二類 (緊急)</th>
                        <th>第三類 (次緊急-50%)</th>
                        <th>第四/五類 (非緊急-95%)</th>
                    </tr>
                </thead>
                <tbody id="hospitalData">
                    <tr><td colspan="5" class="loading">⏳ 正在同步實時數據，請稍候...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="errorMessage"></div>
    </div>

    <script>
        const originalURL = "https://www.ha.org.hk/opendata/aewaitingtime/aewaitingtime-tc.json";
        
        // 備用線路列表
        const proxies = [
            "https://corsproxy.io/?",
            "https://api.allorigins.win/raw?url="
        ];

        async function tryFetch(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network fail');
            return await response.json();
        }

        async function loadData() {
            const tbody = document.getElementById('hospitalData');
            const updateTimeEl = document.getElementById('updateTime');
            const errorEl = document.getElementById('errorMessage');

            // 嘗試每一條線路
            for (let proxy of proxies) {
                try {
                    const targetURL = proxy + encodeURIComponent(originalURL);
                    console.log("正在嘗試線路:", proxy);
                    const data = await tryFetch(targetURL);
                    
                    // 成功獲取數據後的處理
                    renderTable(data);
                    errorEl.innerHTML = ""; // 清除錯誤訊息
                    return; // 成功後直接跳出函數
                } catch (e) {
                    console.warn("線路失敗，嘗試下一條...");
                }
            }

            // 如果所有線路都失敗
            updateTimeEl.innerText = "所有數據線路暫時失效。";
            tbody.innerHTML = `<tr><td colspan="5" class="error-msg">無法獲取數據。這通常是醫管局伺服器阻擋了請求。<br>請嘗試直接點擊此處查看原始數據：<a href="${originalURL}" target="_blank">HA JSON Link</a></td></tr>`;
        }

        function renderTable(data) {
            const tbody = document.getElementById('hospitalData');
            document.getElementById('updateTime').innerText = `最後更新時間：${data.updateTime}`;
            tbody.innerHTML = ""; 

            data.waitTime.forEach(hosp => {
                const row = document.createElement('tr');
                
                // 邏輯判斷：如果 95% 指標超過 4 小時，文字變紅色
                const isLongWait = hosp.t45p95.includes('小時') && parseFloat(hosp.t45p95) >= 4;
                // 處理特殊狀態（如「多名病人正在搶救中」）
                const specialStatus = hosp.t1wt.includes('搶救') ? 'warning' : '';

                row.innerHTML = `
                    <td><strong>${hosp.hospName}</strong></td>
                    <td class="${specialStatus}">${hosp.t1wt}</td>
                    <td>${hosp.t2wt}</td>
                    <td>${hosp.t3p50}</td>
                    <td class="${isLongWait ? 'warning' : ''}">${hosp.t45p95}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 執行加載
        loadData();
        
        // 每 15 分鐘自動刷新一次
        setInterval(loadData, 900000);
    </script>
</body>
</html>
